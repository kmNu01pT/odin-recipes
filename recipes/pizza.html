   <h1>Pizza</h1>
   <img src="https://images.media-allrecipes.com/userphotos/3474658.jpg" alt= "Tasty looking Pizza">
   <h2> Description</h2>
      <p> This is a marvelous pizza passed down by german orignators for generations.</p> 
      <p> It includes the finest ingrediants plus the history of one of the greatest pizzas known to man </p>
   <h3>Ingrediants</h3>

   <p> Dough:</p>
   <ul>
      <li> 1 1/4 cups warm water
      <li>1 teaspoon active dry yeast
      <li>3 cups bread flour
      <li> 1 1/2 teaspoons fine salt
      <li> 1/4 cup olive oil, divided
    </ul>
                        
    <p> Sauce:</p>
    <ul>
       <li> 1 (28 ounce) can plain crushed tomatoes
       <li> 1 (14 ounce) can pizza sauce (such as Don Peppino)
    </ul>
    
    <p> Cheese:</p>
    <ul>
       <li> 8 ounces low-moisture whole-milk mozzarella, very thinned sliced
       <li> 1/4 cup grated Pecorino Romano cheese
    </ul>
    <h4> Steps</h4>
    <ol>
        <li>Combine water and yeast in a small bowl. Let stand until yeast softens and begins to form a creamy foam, about 5 minutes.
        <li> Combine flour and salt together in the bowl of a stand mixer fitted with a dough hook attachment. Pour in yeast mixture. Knead dough until smooth, about 7 minutes.
        <li>Grease a large bowl lightly with olive oil. Form dough into a tight ball and lightly grease the top. Place in the bowl; cover loosely with plastic wrap. Let rise until doubled in volume, about 30 minutes.
        <li>Mix crushed tomatoes and pizza sauce together in a bowl to make sauce.
        <li>Grease a heavy-gauge rimmed 12x17-inch baking sheet generously with olive oil. Press dough into the bottom. Prick dough all over with a fork. Arrange mozzarella cheese slices over dough; cover with 1 cup sauce. Sprinkle Pecorino Romano cheese on top. Drizzle remaining olive oil over pizza.
        <li>Let pizza rise in a warm area until puffy, about 1 hour.
        <li>Preheat oven to 450 degrees F (230 degrees C).
        <li>Bake pizza on the center rack of the preheated oven until edges are very dark brown but top is not burnt, 15 to 20 minutes. Cool in the pan for 5 minutes before slicing into squares.
    </ol>
